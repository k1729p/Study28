services:
  elasticsearch:
    container_name: elasticsearch
    image: elasticsearch:9.3.2
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - net
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Elasticsearch is memory-intensive; these limits help on a local dev machine
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    tty: true
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://localhost:9200/_cluster/health | grep -vq ''"status":"red"''',
        ]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
volumes:
  elasticsearch-data:
