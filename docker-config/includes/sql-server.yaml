services:
  sql-server:
    container_name: sql-server
    image: mcr.microsoft.com/mssql/server
    ports:
      - "1433:1433"
    networks:
      - app-net
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ABab1234
    restart: always
    # healthcheck:
    #     test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost  -U sa -P ABab1234 -Q 'SELECT 1' || exit 1"]
    #     interval: 10s
    #     retries: 10
    #     start_period: 10s
    #     timeout: 3s     
    volumes:
      - sql-server-data:/var/opt/mssql
volumes:
  sql-server-data:
