services:
  postgresql:
    container_name: postgresql
    image: postgres
    ports:
      - "5432:5432"
    networks:
      - net
    shm_size: 128mb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql
volumes:
  postgres-data:
