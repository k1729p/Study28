services:
  postgresql:
    container_name: postgresql
    image: postgres
    ports:
      - "5432:5432"
    networks:
      - app-net
    shm_size: 128mb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    restart: always
    # healthcheck:
    #   test: [ "CMD", "pg_isready" ]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql
volumes:
  postgres-data:
