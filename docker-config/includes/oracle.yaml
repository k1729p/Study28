services:
  oracle:
    container_name: oracle
    image: container-registry.oracle.com/database/free:latest
    ports:
      - "1521:1521"
    networks:
      - app-net
    environment:
      - ORACLE_PWD=ABab1234
    restart: always
    volumes:
      - oracle_data:/opt/oracle/oradata
volumes:
  oracle_data:
