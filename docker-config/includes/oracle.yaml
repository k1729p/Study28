services:
  oracle:
    container_name: oracle
    image: container-registry.oracle.com/database/free:latest
    ports:
      - "1521:1521"
    networks:
      - net
    environment:
      - ORACLE_PWD=ABab1234
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "lsnrctl status || exit 1"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - oracle-data:/opt/oracle/oradata
volumes:
  oracle-data:
