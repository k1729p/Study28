services:
  mysql:
    container_name: mysql
    image: mysql
    ports:
      - "3306:3306"
    networks:
      - net
    environment:
      - MYSQL_DATABASE=kp_database
      - MYSQL_ROOT_PASSWORD=mikimiki
      - MYSQL_USER=kp
      - MYSQL_PASSWORD=mikimiki
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
