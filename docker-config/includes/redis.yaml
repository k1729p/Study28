services:
  redis:
    container_name: redis
    image: redis
    ports:
      - "6379:6379"
    networks:
      - net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - redis-data:/data
volumes:
  redis-data:
