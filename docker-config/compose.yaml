include:
  - includes/cassandra.yaml
  - includes/elasticsearch.yaml
  - includes/mongodb.yaml
  - includes/mysql.yaml
  - includes/oracle.yaml
  - includes/postgresql.yaml
  - includes/redis.yaml
  - includes/sql-server.yaml
services:
  study28:
    container_name: study28
    image: eeengcs/study28:1.0.0-SNAPSHOT
    depends_on:
      - cassandra
      - elasticsearch
      - mongodb
      - mysql
      - oracle
      - postgresql
      - redis
      - sql-server
    ports:
      - "8028:8028"
    networks:
      - app-net
      #- frontend <--- ALTERNATIVE WITH TWO NETWORKS
      #- backend  <--- ALTERNATIVE WITH TWO NETWORKS
    restart: always
networks:
  app-net:
    driver: bridge
